resources:
- repo: self

pool:
  vmImage: windows-latest

trigger: none

variables:
  BuildConfiguration: 'Release'
  TeamName: 'Package Experience'

stages:
- stage: Build
  dependsOn: []
  jobs:
  - job: build
    steps:
    - template: build/build.yml
      parameters:
        nuspecProperties: 'VersionSuffix=CI-$(Build.BuildNumber)'
