resources:
- repo: self

pool:
  vmImage: windows-latest

trigger: none

pr:
- master
- releases/*

variables:
  BuildConfiguration: 'Debug'
  TeamName: 'Package Experience'

stages:
- stage: Build
  dependsOn: []
  jobs:
  - job: build
    steps:
    - template: build/build.yml
      parameters:
        nuspecProperties: 'VersionSuffix=-PR-$(Build.BuildNumber)'
